<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kéo Búa Bao Cute Battle</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="top-bar">
      <h1>🎮 Kéo Búa Bao - Thắng được mình 3 game thì..</h1>
      <button id="resetBtn">Reset Game</button>
    </div>

    <!-- SCORE -->
    <div class="score-board">

      <div class="player-card">

        <div class="avatar-box">
          <img id="playerAvatar"
            src="assets/img/player-default.jpg"
            alt="">
        </div>

        <input type="file" id="avatarUpload" accept="image/*">

        <h2>Người Chơi</h2>

        <div class="score">
          <span id="playerScore">0</span>
        </div>

      </div>

      <div class="round-info">

        <div class="round-text">
          Round <span id="roundNumber">1</span>/5
        </div>

        <div class="status-text" id="statusText">
          Chọn chiêu để bắt đầu ✨
        </div>

      </div>

      <div class="player-card">

        <div class="avatar-box">
          <img src="assets/img/computer-avatar.jpg" alt="">
        </div>

        <h2>Nhựt</h2>

        <div class="score">
          <span id="computerScore">0</span>
        </div>

      </div>

    </div>

    <!-- ARENA -->
    <div class="battle-area">

      <div class="hand-section">

        <p>Người chơi</p>

        <div class="hand-wrapper">
          <img id="playerHand"
            src="assets/img/rock.jpg"
            class="battle-hand"
            alt="">
        </div>

      </div>

      <div class="vs-text">
        VS
      </div>

      <div class="hand-section">

        <p>Nhựt</p>

        <div class="hand-wrapper">
          <img id="computerHand"
            src="assets/img/rock.jpg"
            class="battle-hand enemy"
            alt="">
        </div>

      </div>

    </div>

    <!-- CONTROLS -->
    <div class="controls">

      <button class="choice-btn" data-choice="rock">
        ✊ Búa
      </button>

      <button class="choice-btn" data-choice="paper">
        ✋ Bao
      </button>

      <button class="choice-btn" data-choice="scissors">
        ✌️ Kéo
      </button>

    </div>

  </div>

  <!-- POPUP -->
  <div class="popup hidden" id="popup">

    <div class="popup-content">

      <img id="popupImage"
        src=""
        class="popup-image"
        alt="">

      <h2 id="popupTitle"></h2>

      <p id="popupDesc"></p>

      <button id="popupBtn">Chơi Lại</button>

    </div>

  </div>

  <!-- AUDIO -->
  <audio id="shakeSound" src="assets/sound/shake.mp3"></audio>
  <audio id="winSound" src="assets/sound/win.mp3"></audio>
  <audio id="loseSound" src="assets/sound/lose.mp3"></audio>
  <audio id="clickSound" src="assets/sound/click.mp3"></audio>

  <script src="script.js"></script>

</body>
</html>
