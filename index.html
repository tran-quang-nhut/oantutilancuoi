<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      viewport-fit=cover,
      user-scalable=no
    "
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <title>
    metlamroinha
  </title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg bg1"></div>
  <div class="bg bg2"></div>

  <!-- APP -->

  <main class="app">

    <div class="container">

      <h1>
        🎮 Hữu diên sẽ thắng
      </h1>

      <p class="subtitle">
        Đánh bại Nhựt để nhận thưởng
      </p>

      <!-- ROUND -->

      <div class="round-box">

        <span>
          Lượt chơi:
        </span>

        <span id="roundText">
          0 / 10
        </span>

      </div>

      <!-- BATTLE -->

      <section class="battle">

        <div class="player-card">

          <div class="player-name">
            Bạn
          </div>

          <img
            id="playerImg"
            class="weapon"
            src="Rock.png"
            alt=""
            draggable="false"
          >

        </div>

        <div class="vs">
          VS
        </div>

        <div class="player-card">

          <div class="player-name">
            Nhựt
          </div>

          <img
            id="computerImg"
            class="weapon"
            src="Paper.png"
            alt=""
            draggable="false"
          >

        </div>

      </section>

      <!-- RESULT -->

      <div
        class="result"
        id="result"
      >

        Chọn vũ khí 👇

      </div>

      <!-- CHOICES -->

      <div class="choices">

        <button
          class="choice-btn"
          onclick="startGame('rock')"
        >

          <img
            src="Rock.png"
            alt=""
          >

        </button>

        <button
          class="choice-btn"
          onclick="startGame('paper')"
        >

          <img
            src="Paper.png"
            alt=""
          >

        </button>

        <button
          class="choice-btn"
          onclick="startGame('scissors')"
        >

          <img
            src="Scissors.png"
            alt=""
          >

        </button>

      </div>

      <!-- CONTINUE -->

      <button
        class="continue-btn"
        id="continueBtn"
      >

        🔄 Chơi tiếp

      </button>

      <!-- SCORE -->

      <div class="scoreboard">

        <div class="score-box">

          <div>
            🏆
          </div>

          <div>
            Thắng
          </div>

          <div id="winScore">
            0
          </div>

        </div>

        <div class="score-box">

          <div>
            💀
          </div>

          <div>
            Thua
          </div>

          <div id="loseScore">
            0
          </div>

        </div>

        <div class="score-box">

          <div>
            🤝
          </div>

          <div>
            Hòa
          </div>

          <div id="drawScore">
            0
          </div>

        </div>

      </div>

    </div>

  </main>

  <!-- WIN POPUP -->

  <div
    class="popup"
    id="winPopup"
  >

    <div class="popup-box">

      <img
        src="reward.png"
        class="popup-img"
        alt=""
      >

      <h2>
        🎉 CHÚC MỪNG 🎉
      </h2>

      <p>
        Bạn đã thắng đủ 3 trận
        và nhận được phần thưởng!
      </p>

      <button id="closeWin">
        Nhận thưởng
      </button>

    </div>

  </div>

  <!-- LOSE POPUP -->

  <div
    class="popup"
    id="losePopup"
  >

    <div class="popup-box">

      <img
        src="lose.png"
        class="popup-img"
        alt=""
      >

      <h2>
        😢 THẤT BẠI
      </h2>

      <p>
        Bạn đã hết 10 lượt
        nhưng chưa đủ 3 chiến thắng!
      </p>

      <button id="closeLose">
        Đóng
      </button>

    </div>

  </div>

  <!-- AUDIO -->

  <audio
    id="battleSound"
    preload="auto"
    playsinline
    webkit-playsinline
  >

    <source
      src="battle.mp3"
      type="audio/mpeg"
    >

    <source
      src="battle.wav"
      type="audio/wav"
    >

  </audio>

  <script src="script.js"></script>

</body>
</html>
